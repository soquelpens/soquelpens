{% render "_header.html" %}

<pens-page-hero
  heading="PENS"
  heading-accent="Calendar"
  subheading="Stay up to date with the Soquel PENS school calendar."
  breadcrumb="Calendar"
  bgimage="/uploads/6/4/9/4/64940231/background-images/119899516.jpg">
</pens-page-hero>


<!-- Calendar PDF -->
<div class="pdf-section">
  <div class="pdf-inner">

    <div class="pdf-meta">
      <div class="pdf-meta-left">
        <div class="pdf-issue">Calendar</div>
        <div class="pdf-title">Soquel PENS Calendar — 2025-2026</div>
        <div class="pdf-date">Published August 2025 &nbsp;·&nbsp; School Year 2025–2026</div>
      </div>
      <div class="pdf-actions">
        <a href="/uploads/6/4/9/4/64940231/spens_25-26__2_.pdf"
           target="_blank" class="pdf-btn filled" id="downloadBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </a>
      </div>
    </div>

    <!-- PDF EMBED: uses Google Docs viewer as a reliable cross-browser renderer -->
    <div class="pdf-embed-wrap" id="pdfWrap">
      <iframe
        id="pdfFrame"
        src="https://docs.google.com/viewer?url=https%3A%2F%2Fwww.soquelpens.org%2Fuploads%2F6%2F4%2F9%2F4%2F64940231%2Fspens_25-26__2_.pdf&embedded=true"
        title="Soquel PENS Newsletter Spring 2025"
        allowfullscreen>
      </iframe>
      <div class="pdf-fallback" id="pdfFallback">
        <p>Having trouble viewing the PDF? You can open it directly in your browser.</p>
        <a href="/uploads/6/4/9/4/64940231/spens_25-26__2_.pdf" target="_blank">Open Newsletter PDF →</a>
      </div>
    </div>

  </div>
</div>

{% render "_footer.html" %}
