name: Run Tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Dart Sass
        run: |
        curl -LJO https://github.com/sass/dart-sass/releases/download/1.98.0/dart-sass-1.98.0-linux-x64.tar.gz
        tar -xf dart-sass-1.98.0-linux-x64.tar.gz
        cp -r dart-sass/* /usr/local/bin
        rm -rf dart-sass*
      - name: Install dependencies
        run: |
          pipx install uv==0.10.8 && uv run make html
      - name: Build css
        run: |
          uv run make css
      - name: Run test suite
        run: |
          PYTHONPATH=`pwd` uv run pytest